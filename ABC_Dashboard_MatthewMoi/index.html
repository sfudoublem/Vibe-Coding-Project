<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inventory with Chart Toggle + Clear Button + Duplicate Error</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 40px; 
      overflow-y: hidden;
    }

    .navbar {
      background: #333;
      padding: 12px 20px;
      margin-bottom: 25px;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin-right: 20px;
      font-size: 18px;
    }

    .navbar a:hover {
      text-decoration: underline;
    }

    .container {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    .left-panel {
      width: 40%;
    }

    .right-panel {
      width: 60%;
    }

    form { margin-bottom: 20px; }
    label { display: block; margin-top: 10px; }
    input { padding: 6px; width: 250px; }

    .button-row {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    button { padding: 8px 14px; }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .chart-container {
      height: 350px;
    }

    .pie-size {
      height: 250px !important;
    }

    ul { margin-top: 20px; padding-left: 20px; }
    li { margin-bottom: 6px; }

    /* Error message styling */
    .error-message {
      color: red;
      margin-top: 10px;
      font-weight: bold;
      display: none;
      opacity: 1;
    }

    /* Fade-out animation */
    .error-fade {
      animation: fadeOut 1s forwards;
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html">Dashboard</a>
    <a href="about.html">About</a>
  </nav>

  <h2>Inventory Entry with Live Chart</h2>

  <div class="container">
    <div class="left-panel">
      <form id="inventoryForm">
        <label>
          Item Name:
          <input type="text" id="itemName" required>
        </label>

        <label>
          Quantity:
          <input type="number" id="itemQty" min="1" required>
        </label>

        <div class="button-row">
          <button type="submit">Add Item</button>
          <button type="button" id="clearAllBtn">Clear All Items</button>
        </div>

        <!-- Inline error message -->
        <div id="errorMessage" class="error-message"></div>
      </form>

      <h3>Current Inventory</h3>
      <ul id="inventoryList"></ul>
    </div>

    <div class="right-panel">
      <div class="chart-header">
        <h3>Inventory Chart</h3>
        <button id="toggleChartBtn">Switch to Pie Chart</button>
      </div>

      <div id="chartWrapper" class="chart-container">
        <canvas id="inventoryChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('inventoryForm');
    const list = document.getElementById('inventoryList');
    const toggleBtn = document.getElementById('toggleChartBtn');
    const clearBtn = document.getElementById('clearAllBtn');
    const chartWrapper = document.getElementById('chartWrapper');

    const ctx = document.getElementById('inventoryChart').getContext('2d');

    const chartData = {
      labels: [],
      quantities: []
    };

    let currentChartType = 'bar';
    let inventoryChart = createChart(currentChartType);

    function createChart(type) {
      return new Chart(ctx, {
        type: type,
        data: {
          labels: chartData.labels,
          datasets: [{
            label: 'Quantity',
            data: chartData.quantities,
            backgroundColor: [
              'rgba(54, 162, 235, 0.6)',
              'rgba(255, 99, 132, 0.6)',
              'rgba(255, 206, 86, 0.6)',
              'rgba(75, 192, 192, 0.6)',
              'rgba(153, 102, 255, 0.6)',
              'rgba(255, 159, 64, 0.6)'
            ]
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: type === 'bar' ? { y: { beginAtZero: true } } : {}
        }
      });
    }

    function saveToLocalStorage() {
      const data = {
        labels: chartData.labels,
        quantities: chartData.quantities
      };
      localStorage.setItem('inventoryData', JSON.stringify(data));
    }

    function loadFromLocalStorage() {
      const saved = localStorage.getItem('inventoryData');
      if (!saved) return;

      const data = JSON.parse(saved);
      chartData.labels.push(...data.labels);
      chartData.quantities.push(...data.quantities);

      data.labels.forEach((name, i) => {
        const li = document.createElement('li');
        li.textContent = `${name} — ${data.quantities[i]}`;
        list.appendChild(li);
      });

      inventoryChart.update();
    }

    loadFromLocalStorage();

    /* Updated submit handler with fade-out error message */
    form.addEventListener('submit', function(event) {
      event.preventDefault();

      const name = document.getElementById('itemName').value.trim();
      const qty = parseInt(document.getElementById('itemQty').value);
      const errorBox = document.getElementById('errorMessage');

      // Clear previous error
      errorBox.style.display = "none";
      errorBox.textContent = "";
      errorBox.classList.remove("error-fade");

      if (!name || !qty) return;

      const existingIndex = chartData.labels.indexOf(name);

      if (existingIndex !== -1) {
        errorBox.textContent = `Error: The item "${name}" already exists in the inventory.`;
        errorBox.style.display = "block";

        // Restart animation cleanly
        void errorBox.offsetWidth;

        // Start fade-out after 3 seconds
        setTimeout(() => {
          errorBox.classList.add("error-fade");
        }, 3000);

        // Fully hide after fade completes
        setTimeout(() => {
          errorBox.style.display = "none";
          errorBox.classList.remove("error-fade");
        }, 4000);

        form.reset();
        return;
      }

      chartData.labels.push(name);
      chartData.quantities.push(qty);

      const li = document.createElement('li');
      li.textContent = `${name} — ${qty}`;
      list.appendChild(li);

      inventoryChart.update();
      saveToLocalStorage();

      form.reset();
    });

    toggleBtn.addEventListener('click', () => {
      inventoryChart.destroy();

      currentChartType = currentChartType === 'bar' ? 'pie' : 'bar';
      inventoryChart = createChart(currentChartType);

      toggleBtn.textContent =
        currentChartType === 'bar'
          ? 'Switch to Pie Chart'
          : 'Switch to Bar Chart';

      chartWrapper.classList.toggle('pie-size', currentChartType === 'pie');
    });

    clearBtn.addEventListener('click', () => {
      list.innerHTML = '';
      chartData.labels.length = 0;
      chartData.quantities.length = 0;

      inventoryChart.destroy();
      inventoryChart = createChart(currentChartType);

      localStorage.removeItem('inventoryData');
    });
  </script>

</body>
</html>
